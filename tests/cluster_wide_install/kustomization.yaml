# Set WATCH_NAMESPACE to "" in the deployment to provide cluster-wide install testing
namespace: test-cluster-wide-install

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
patchesJson6902:
- target:
    group: apps
    version: v1
    name: controller-manager
    kind: Deployment
  patch: |-
    - op: remove
      path: /spec/template/spec/containers/0/env/0/valueFrom
    - op: add
      path: /spec/template/spec/containers/0/env/0/value
      value: ""
- target:
    group: rbac.authorization.k8s.io
    version: v1
    kind: ClusterRoleBinding
    name: cass-operator-manager-crrole
  patch: |-
    - op: add
      path: /subjects/0/namespace
      value: test-cluster-wide-install
resources:
- ../../config/cluster
